<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Ну и что мы тут ищем?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrapper {
            max-width: 1100px;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
        }
        
        /* Левый блок с текстом */
        .content {
            flex: 1;
            max-width: 500px;
        }
        .tag {
            font-family: monospace;
            color: #ff7a00; 
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 24px;
        }
        h1 span {
            color: #ff7a00;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #8a8a8a; 
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background-color: #ff7a00;
            color: #000000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
        }
        .btn:hover {
            background-color: #ff9433;
            box-shadow: 0 0 20px rgba(255, 122, 0, 0.4);
        }
        

        .image-card {
            flex: 1;
            max-width: 460px;
            background-color: #121212;
            border: 1px solid #1e1e1e; 
            border-radius: 12px;
            padding: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .fox-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            filter: grayscale(10%) brightness(0.85);
            object-fit: cover;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
                justify-content: center;
                text-align: center;
                padding: 30px 20px;
                gap: 30px;
            }
            .image-card {
                width: 100%;
                max-width: 340px;
                padding: 12px;
            }
            .content {
                width: 100%;
            }
            h1 {
                font-size: 2.2rem;
                margin-bottom: 16px;
            }
            p {
                font-size: 1rem;
                margin-bottom: 30px;
            }
            .btn {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="image-card">
            <img class="fox-image" src="https://safeworldwide.org/wp-content/uploads/2022/08/Screen-Shot-2022-08-22-at-8.51.33-PM.png" alt="Осуждающая тибетская лиса">
        </div>

        <div class="content">
            <div class="tag">// error 404</div>
            <h1>Ну и что мы тут <span>ищем?</span></h1>
            <p>Кажется, вы зашли не в тот раздел сайта и спугнули тибетскую лисицу... Теперь она стоит, смотрит на вас и мысленно осуждает все ваши жизненные выборы, приведшие вас на эту страницу.</p>
            <a href="/" class="btn">Оставить в покое</a>
        </div>

    </div>

</body>
</html>
