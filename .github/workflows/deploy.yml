name: Production Deploy

on:
  push:
    branches:
      - main  # Скрипт сработает только при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем актуальный код из вашего репозитория GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Копируем файлы на ваш сервер по SSH с использованием пароля
    - name: Deploy to Server via SSH Password
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }} # Используем пароль вместо ключа
        source: "." # Копируем все файлы проекта
        target: "/var/www/vulpixel" # ВАЖНО: укажите точный путь к папке сайта на сервере
