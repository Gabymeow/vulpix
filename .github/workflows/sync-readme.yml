name: Sync README to Notion

on:
  push:
    branches:
      - main  # Если у вас master, напишите здесь master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push README to Notion
        uses: agonzalezl/readme-to-notion-action@master
        with:
          file-path: './README.md'
          notion-token: ${{ secrets.NOTION_TOKEN }}
          notion-page-id: ${{ secrets.NOTION_PAGE_ID }}
